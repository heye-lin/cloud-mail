# Forward inbound MIME requests to the Node API.
# Replace the domain, upstream address, and TLS configuration to match your deployment.

server {
    listen 80;
    server_name mail-api.example.com;

    client_max_body_size 50m;

    location /api/webhooks/inbound-email {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional envelope hints for upstream gateways that do not preserve them as headers.
        proxy_set_header X-Envelope-To $http_x_envelope_to;
        proxy_set_header X-Envelope-From $http_x_envelope_from;

        proxy_request_buffering on;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }
}
